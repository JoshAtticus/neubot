<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal - neubot</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/ui-kit.css">
    <link rel="icon" href="/neubot-icon.svg" type="image/svg+xml">
    <style>
        .app-secret { filter: blur(4px); transition: filter 0.2s; cursor: pointer; }
        .app-secret:hover { filter: none; }
        code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.9em;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1 style="font-size: 2rem; margin: 0;">neubot developers</h1>
            <a href="/" class="back-link">Back to Home</a>
        </div>

        <div class="legal-content">
            <h1 style="margin-bottom: 2rem;">My Apps</h1>

            <section style="margin-bottom: 3rem;">
                <div id="app-list" style="display: grid; gap: 1rem;">Loading...</div>
            </section>
            
            <section>
                <h2>Create New App</h2>
                <div class="card">
                    <form id="create-app-form">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary); font-size: var(--text-sm);">App Name</label>
                            <input type="text" id="client_name" class="input" required placeholder="e.g. My Dashboard">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary); font-size: var(--text-sm);">Homepage URL</label>
                            <input type="url" id="client_uri" class="input" placeholder="https://example.com">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--color-text-secondary); font-size: var(--text-sm);">Redirect URIs (one per line)</label>
                            <textarea id="redirect_uris" class="input" rows="3" required placeholder="https://example.com/callback"></textarea>
                            <p style="margin-top: 0.5rem; margin-bottom: 0; font-size: var(--text-xs); color: var(--color-text-muted);">
                                These URIs are where we will redirect the user after they authorize your app.
                            </p>
                        </div>
                        <button type="submit" class="btn btn--primary">Create App</button>
                    </form>
                </div>
            </section>
        </div>
    </div>
    <script>
        async function loadApps() {
            const res = await fetch('/api/developer/apps');
            if (res.status === 401) window.location.href = '/login';
            const apps = await res.json();
            const container = document.getElementById('app-list');
            
            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; color: var(--color-text-muted); padding: 3rem;">
                        <p>You haven't created any apps yet.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = apps.map(app => `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <h3 style="margin: 0; font-size: var(--text-xl);">${app.client_name}</h3>
                        ${app.client_uri ? `<a href="${app.client_uri}" target="_blank" style="color: var(--color-primary); font-size: var(--text-sm);">Visit Site ↗</a>` : ''}
                    </div>
                    
                    <div style="display: grid; gap: 0.75rem;">
                        <div>
                            <div style="font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: 0.25rem;">Client ID</div>
                            <code>${app.client_id}</code>
                        </div>
                        
                        <div>
                            <div style="font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: 0.25rem;">Client Secret</div>
                            <code class="app-secret" title="Hover to reveal">${app.client_secret}</code>
                        </div>
                        
                        <div>
                            <div style="font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: 0.25rem;">Redirect URIs</div>
                            ${app.redirect_uris.map(uri => `<code>${uri}</code>`).join('<br>')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('create-app-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Creating...';

            const data = {
                client_name: document.getElementById('client_name').value,
                client_uri: document.getElementById('client_uri').value,
                redirect_uris: document.getElementById('redirect_uris').value
            };
            
            try {
                const res = await fetch('/api/developer/apps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    loadApps();
                    e.target.reset();
                } else {
                    alert('Error creating app');
                }
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        loadApps();
    </script>
</body>
</html>
